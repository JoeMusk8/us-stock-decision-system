name: Streamlit App Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile project
        run: python -m compileall -q app.py core modules tests

      - name: Run model tests
        run: |
          python tests/test_workspace_state.py
          python tests/test_paradigm_monitor_model.py
          python tests/test_paradigm_to_basic_bridge.py
          python tests/test_basic_research_model.py
          python tests/test_basic_to_deep_bridge.py
          python tests/test_deep_research_model.py
          python tests/test_research_to_tracking_bridge.py
          python tests/test_tracking_pool_model.py
          python tests/test_yfinance_market_client.py
          python tests/test_market_environment_rules.py
